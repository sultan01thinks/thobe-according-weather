<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل الطقس للثوب</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>🌡️ دليل الطقس للثوب</h1>
                <p class="subtitle">توصياتك اليومية للثوب</p>
            </div>
            
            <div id="locationPrompt" class="location-prompt">
                <div class="location-prompt-content">
                    <div class="location-icon">📍</div>
                    <h3>تفعيل الموقع</h3>
                    <p>للحصول على أفضل التوصيات، يرجى السماح بالوصول إلى موقعك</p>
                    <button id="allowLocationBtn" class="location-btn">السماح بالوصول إلى الموقع</button>
                    <button id="skipLocationBtn" class="location-btn secondary">تخطي</button>
                </div>
            </div>
            
            <div class="weather-section">
                <div class="location-input">
                    <input type="text" id="cityInput" placeholder="أدخل اسم المدينة (مثل: الرياض، دبي)" />
                    <button id="getWeatherBtn">الحصول على التوصية</button>
                </div>
                
                <div id="weatherInfo" class="weather-info hidden">
                    <div class="temperature-display">
                        <div class="temp-value" id="temperature">--</div>
                        <div class="temp-unit">°م</div>
                    </div>
                    <div class="city-name" id="cityName">--</div>
                    <div class="weather-desc" id="weatherDesc">--</div>
                </div>
            </div>
            
            <div id="recommendation" class="recommendation hidden">
                <div class="recommendation-icon" id="recommendationIcon">👕</div>
                <div class="recommendation-text" id="recommendationText">--</div>
                <div class="recommendation-reason" id="recommendationReason">--</div>
            </div>
            
            <div id="weatherAlerts" class="weather-alerts hidden"></div>
            
            <div id="activityRecommendations" class="activity-recommendations hidden">
                <h3 class="section-title">🎯 توصيات الأنشطة</h3>
                <div id="activityList" class="activity-list"></div>
            </div>
            
            <div id="hourlyForecast" class="hourly-forecast hidden">
                <h3 class="section-title">📅 التوقعات اليومية</h3>
                <p class="section-subtitle">خطط ليومك - اعرف متى ترتدي ماذا</p>
                <div id="hourlyList" class="hourly-list"></div>
            </div>
            
            <div id="loading" class="loading hidden">
                <div class="spinner"></div>
                <p>جاري جلب بيانات الطقس...</p>
            </div>
            
            <div id="error" class="error hidden"></div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
